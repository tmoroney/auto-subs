name: Bug report
description: Something broke — help us fix it.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: >
        Please [search existing issues](https://github.com/tmoroney/auto-subs/issues?q=is%3Aissue)
        before submitting to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug, including any error message shown by AutoSubs.
      placeholder: e.g. Transcription failed with "Failed to normalize audio: ffmpeg exited with code 1"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open AutoSubs in DaVinci Resolve
        2. Select audio track 1
        3. Click "Generate Subtitles"
        4. See error ...
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: autosubs-version
    attributes:
      label: AutoSubs version
      description: e.g. 3.2.1
    validations:
      required: true

  - type: input
    id: resolve-version
    attributes:
      label: DaVinci Resolve version
      description: Leave blank if running in standalone mode. e.g. 19.1.2
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Log file contents
      description: >-
        Click "Open Log Folder" in the error dialog, open `autosubs.log`,
        and paste the relevant portion here.
      render: shell
      placeholder: Paste the contents of autosubs.log here...
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Screenshots, videos, or anything else that helps.
    validations:
      required: false
